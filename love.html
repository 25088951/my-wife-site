<!DOCTYPE html>
<html>
<head>
<title>Do You Really Love Me? 💜</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music/song.mp3" type="audio/mpeg">
</audio>

<button class="musicBtn" onclick="playMusic()">🎵 Play Music</button>

<div class="box">
<h1>Do you love Your Man? 🧸💜</h1>

<button id="yesBtn" onclick="yes()">YES 💖</button>
<button id="noBtn">NO 😏</button>
</div>

<div class="float">🧸💜❤️🧸💜❤️🧸💜❤️</div>

<script>
function playMusic(){
document.getElementById("bgMusic").play();
}

function yes(){
window.location.href = "plan.html";
}

const noBtn = document.getElementById("noBtn");

let count = 0;

noBtn.addEventListener("mouseover", () => {

count++;

// move away
noBtn.style.position = "absolute";
noBtn.style.top = Math.random()*80 + "%";
noBtn.style.left = Math.random()*80 + "%";

// funny text changes
if(count === 1) noBtn.innerText = "No? 😏";
if(count === 2) noBtn.innerText = "Are you sure? 🥺";
if(count === 3) noBtn.innerText = "Think again and stop playing bruh 🥺😭";
if(count === 4) noBtn.innerText = "Last chance 😭";

// disappear
if(count >= 5){
noBtn.style.display = "none";
}
});
</script>

</body>
</html>
